---
- name: Obtener password LAPS
  ansible.windows.win_shell: |
    $hostname = $env:COMPUTERNAME
    $dc = "{{ domain_controller }}"

    $lapsPassword = $null
    $expiration = $null

    # Intentar Windows LAPS nativo
    $lapsInfo = Get-LapsADPassword -Identity $hostname -AsPlainText -ErrorAction SilentlyContinue
    if ($lapsInfo) {
      $lapsPassword = $lapsInfo.Password
      $expiration = $lapsInfo.ExpirationTimestamp.ToString('yyyy-MM-dd HH:mm')
    }

    # Fallback a LAPS legacy
    if (-not $lapsPassword) {
      $computer = Get-ADComputer $hostname -Server $dc -Properties ms-Mcs-AdmPwd, ms-Mcs-AdmPwdExpirationTime -ErrorAction SilentlyContinue
      if ($computer.'ms-Mcs-AdmPwd') {
        $lapsPassword = $computer.'ms-Mcs-AdmPwd'
        $expTime = $computer.'ms-Mcs-AdmPwdExpirationTime'
        if ($expTime) {
          $expiration = [datetime]::FromFileTime($expTime).ToString('yyyy-MM-dd HH:mm')
        }
      }
    }

    if ($lapsPassword) {
      @{ hostname = $hostname; password = $lapsPassword; expiration = $expiration } | ConvertTo-Json
    } else {
      @{ hostname = $hostname; error = "No se encontro password LAPS" } | ConvertTo-Json
    }
  register: laps_result
  changed_when: false

- name: Mostrar password LAPS
  ansible.builtin.debug:
    msg: "{{ laps_result.stdout | from_json }}"
