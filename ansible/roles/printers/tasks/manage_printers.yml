---
- name: Listar impresoras instaladas
  ansible.windows.win_shell: |
    $printers = Get-Printer | Select-Object Name, DriverName, PortName, PrinterStatus, Shared
    $printers | ForEach-Object {
      @{
        name   = $_.Name
        driver = $_.DriverName
        port   = $_.PortName
        status = $_.PrinterStatus.ToString()
        shared = $_.Shared
      }
    } | ConvertTo-Json -Depth 2
  register: printer_list
  changed_when: false

- name: Verificar trabajos pendientes
  ansible.windows.win_shell: |
    $jobs = Get-PrintJob -PrinterName * -ErrorAction SilentlyContinue
    if ($jobs) {
      @{
        total_jobs = $jobs.Count
        jobs = @($jobs | Select-Object -First 10 | ForEach-Object {
          @{
            printer  = $_.PrinterName
            document = $_.DocumentName
            status   = $_.JobStatus
            size_kb  = [math]::Round($_.Size / 1KB, 1)
          }
        })
      } | ConvertTo-Json -Depth 3
    } else {
      @{ total_jobs = 0; jobs = @() } | ConvertTo-Json
    }
  register: print_jobs
  changed_when: false

- name: Limpiar cola si hay trabajos atascados
  ansible.windows.win_shell: |
    $jobs = Get-PrintJob -PrinterName * -ErrorAction SilentlyContinue |
            Where-Object { $_.JobStatus -match 'Error|Offline|Blocked' }
    if ($jobs) {
      $jobs | Remove-PrintJob -ErrorAction SilentlyContinue
      Restart-Service Spooler -Force
      Start-Sleep -Seconds {{ spooler_restart_delay }}
      Write-Output "Cola limpiada y spooler reiniciado ($($jobs.Count) trabajos removidos)"
    } else {
      Write-Output "No hay trabajos atascados"
    }
  register: queue_cleanup
  changed_when: "'limpiada' in queue_cleanup.stdout"

- name: Mostrar resultado
  ansible.builtin.debug:
    msg:
      impresoras: "{{ printer_list.stdout | from_json }}"
      trabajos: "{{ print_jobs.stdout | from_json }}"
      limpieza: "{{ queue_cleanup.stdout_lines | first }}"
